<section class="cta-section">

    <!-- Background shapes -->
    <div class="cta-section__shapes" aria-hidden="true">
        <svg viewBox="0 0 1200 500" fill="none" xmlns="http://www.w3.org/2000/svg">
            <polygon points="900,0 1200,0 1200,250 1050,320 820,120" stroke="rgba(245,166,35,0.1)" stroke-width="1"
                fill="none" />
            <polygon points="960,0 1200,0 1200,200 1100,270 880,80" stroke="rgba(245,166,35,0.06)" stroke-width="1"
                fill="none" />
            <polygon points="0,180 200,60 260,220 80,340 0,280" stroke="rgba(255,255,255,0.035)" stroke-width="1"
                fill="none" />
            <circle cx="600" cy="250" r="380" stroke="rgba(245,166,35,0.035)" stroke-width="1" fill="none" />
        </svg>
    </div>

    <div class="container">
        <div class="cta-section__inner" scrollReveal revealFrom="up">
            <span class="cta-section__label">Let's Build Together</span>

            <h2 class="cta-section__heading">
                Ready to Create<br>Something <em>Extraordinary?</em>
            </h2>

            <p class="cta-section__sub">
                Tell us about your project. We'll get back to you within 24 hours.
            </p>

            <div class="cta-section__actions">
                <a class="btn-primary" routerLink="/contact">
                    <span>Start a Project →</span>
                </a>
                <a class="btn-outline" style="border-color: rgba(0,0,0,0.2); color: #000;" routerLink="/projects"
                    onmouseover="this.style.borderColor='#f5a623'; this.style.color='#f5a623'"
                    onmouseout="this.style.borderColor='rgba(0,0,0,0.2)'; this.style.color='#000'">
                    <span>See Our Work →</span>
                </a>
            </div>
        </div>
    </div>

</section>
